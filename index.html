<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>五目並べ AI対戦版</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: 'Arial', sans-serif;
        }
        h1 { color: #333; margin-top: 0; }
        #status {
            margin-bottom: 10px;
            font-size: 24px;
            font-weight: bold;
            color: #555;
            height: 36px; /* 高さを固定してガタつき防止 */
        }
        .controls {
            margin-bottom: 15px;
        }
        canvas {
            background-color: #deb887;
            border: 2px solid #8b4513;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #8b4ss13; /* typo correction */
            background-color: #8b4513;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
        }
        button:hover { background-color: #a0522d; }
        select {
            padding: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>五目並べ</h1>
    
    <div class="controls">
        モード：
        <select id="gameMode">
            <option value="pve">vs コンピュータ</option>
            <option value="pvp">対人 (2人プレイ)</option>
        </select>
    </div>

    <div id="status">黒の番です</div>
    <canvas id="gameBoard" width="600" height="600"></canvas>
    <button onclick="resetGame()">リセット</button>

    <script>
        const canvas = document.getElementById('gameBoard');
        const ctx = canvas.getContext('2d');
        const statusDisplay = document.getElementById('status');
        const modeSelect = document.getElementById('gameMode');
        
        const gridSize = 10;
        const cellSize = canvas.width / (gridSize + 1);
        let board = [];
        let currentPlayer = 1; // 1: 黒, 2: 白
        let gameOver = false;

        function initBoard() {
            board = Array(gridSize).fill().map(() => Array(gridSize).fill(0));
            currentPlayer = 1;
            gameOver = false;
            updateStatus();
            drawBoard();
        }

        function updateStatus() {
            if (gameOver) return;
            const mode = modeSelect.value;
            if (mode === 'pve' && currentPlayer === 2) {
                statusDisplay.textContent = "コンピュータが思考中...";
                statusDisplay.style.color = "#888";
            } else {
                statusDisplay.textContent = `${currentPlayer === 1 ? '黒' : '白'}の番です`;
                statusDisplay.style.color = currentPlayer === 1 ? "#000" : "#555";
            }
        }

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#8b4513";
            // 格子線の描画
            for (let i = 1; i <= gridSize; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cellSize, cellSize);
                ctx.lineTo(i * cellSize, gridSize * cellSize);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(cellSize, i * cellSize);
                ctx.lineTo(gridSize * cellSize, i * cellSize);
                ctx.stroke();
            }
            // 石の描画
            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (board[r][c] !== 0) drawStone(r, c, board[r][c]);
                }
            }
        }

        function drawStone(r, c, player) {
            const x = (c + 1) * cellSize;
            const y = (r + 1) * cellSize;
            ctx.beginPath();
            ctx.arc(x, y, cellSize * 0.4, 0, Math.PI * 2);
            ctx.fillStyle = player === 1 ? "#000" : "#fff";
            ctx.fill();
            if (player === 2) {
                ctx.strokeStyle = "#ccc";
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        canvas.addEventListener('click', (e) => {
            if (gameOver || (modeSelect.value === 'pve' && currentPlayer === 2)) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.latop; // Error fix: rect.top
            const x_fixed = e.clientX - rect.left;
            const y_fixed = e.clientY - rect.top;
            
            // 念のため、座標計算を正確に
            const col = Math.round((x_fixed) / cellSize) - 1;
            const row = Math.round((y_fixed) / cellSize) - 1;

            if (row >= 0 && row < gridSize && col >= 0 && col < gridSize) {
                if (board[row][col] === 0) {
                    makeMove(row, col);
                }
            }
        });

        function makeMove(r, c) {
            board[r][c] = currentPlayer;
            drawBoard();

            if (checkWin(r, c, currentPlayer)) {
                statusDisplay.textContent = `${currentPlayer === 1 ? '黒' : '白'}の勝利！`;
                statusDisplay.style.color = "red";
                gameOver = true;
                return;
            }

            currentPlayer = currentPlayer === 1 ? 2 : 1;
            updateStatus();

            if (modeSelect.value === 'pve' && currentPlayer === 2) {
                setTimeout(aiMove, 600);
            }
        }

        // --- AIロジック ---
        function aiMove() {
            if (gameOver) return;

            let bestScore = -1;
            let move = { r: 7, c: 7 };

            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    if (board[r][c] === 0) {
                        let score = evaluateMove(r, c);
                        if (score > bestScore) {
                            bestScore = score;
                            move = { r, c };
                        }
                    }
                }
            }
            makeMove(move.r, move.c);
        }

        function evaluateMove(r, c) {
            // 攻撃 (白) + 防御 (黒の重みを少し下げる)
            return getScoreForPlayer(r, c, 2) + getScoreForPlayer(r, c, 1) * 0.8;
        }

        function getScoreForPlayer(r, c, player) {
            let totalScore = 0;
            const directions = [[0, 1], [1, 0], [1, 1], [1, -1]];

            for (let i = 0; i < directions.length; i++) {
                let dr = directions[i][0];
                let dc = directions[i][1];
                
                let count = 1;
                count += countStones(r, c, dr, dc, player); // 正方向
                count += countStones(r, c, -dr, -dc, player); // 逆方向

                if (count >= 5) totalScore += 10000;
                else if (count === 4) totalScore += 500;
                else if (count === 3) totalScore += 100;
                else if (count === 2) totalScore += 10;
            }
            return totalScore;
        }

        function countStones(r, c, dr, dc, player) {
            let count = 0;
            let nr = r + dr;
            let nc = c + dc;
            while (nr >= 0 && nr < gridSize && nc >= 0 && nc < gridSize && board[nr][nc] === player) {
                count++;
                nr += dr;
                nc += dc;
            }
            return count;
        }

        function checkWin(r, c, player) {
            const directions = [[0, 1], [1, 0], [1, 1], [1, -1]];
            for (let i = 0; i < directions.length; i++) {
                let dr = directions[i][0];
                let dc = directions[i][1];
                let count = 1;
                count += countStones(r, c, dr, dc, player);
                count += countStones(r, c, -dr, -dc, player);
                if (count >= 5) return true;
            }
            return false;
        }

        function resetGame() {
            initBoard();
        }

        initBoard();
    </script>
</body>
</html>
